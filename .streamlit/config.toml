[server]
maxUploadSize = 50  # 手机拍照通常小于10MB，50MB足够
enableXsrfProtection = false
enableCORS = false

[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[browser]
gatherUsageStats = false

# 手机端特定配置
[client]
showSidebarNavigation = false  # 隐藏侧边栏导航
toolbarMode = "minimal"        # 最小化工具栏

[runner]
# 关闭自动重载，节省手机端资源
watchdogPollRate = 0
